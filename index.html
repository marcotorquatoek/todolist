<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #252525;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.12);
  --text: #ddd6c8;
  --muted: #4a4a4a;
  --done-text: #3e3e3e;
  --danger: #7a3030;
  --overlay: rgba(0,0,0,0.88);
  --modal-bg: #121212;
  --tag-red: #c0392b;
}
[data-theme="light"] {
  --bg: #f5f3ef;
  --surface: #edeae4;
  --border: #d4cfc6;
  --accent: #9a7640;
  --accent-dim: rgba(154,118,64,0.1);
  --text: #2a2520;
  --muted: #9a9288;
  --done-text: #b0a898;
  --danger: #9b3a3a;
  --overlay: rgba(0,0,0,0.5);
  --modal-bg: #f0ede7;
  --tag-red: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lexend', sans-serif;
  font-size: 0.82rem;
  min-height: 100vh;
  padding: 32px 20px 80px;
  transition: background 0.2s, color 0.2s;
}

.container { max-width: 640px; margin: 0 auto; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.header-left { display: flex; align-items: baseline; gap: 10px; }
header h1 {
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: var(--accent);
  text-transform: uppercase;
}
.version {
  font-size: 0.55rem;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 2px 6px;
}
.header-right { display: flex; align-items: center; gap: 8px; }

.btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Lexend', sans-serif;
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 5px 10px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

.section { margin-bottom: 32px; animation: fadeIn 0.25s ease both; }
.section:nth-child(2) { animation-delay: 0.04s; }
.section:nth-child(3) { animation-delay: 0.08s; }
.section:nth-child(4) { animation-delay: 0.12s; }

.section-title {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

/* ── NATIVE CHECKBOX ITEM ── */
input[type="checkbox"] { display: none; }

label.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 10px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, opacity 0.15s;
  user-select: none;
}
label.item:hover { background: var(--surface); border-color: var(--border); }

/* checked state driven by sibling checkbox */
input[type="checkbox"]:checked + label.item {
  opacity: 0.35;
}
input[type="checkbox"]:checked + label.item .item-label {
  text-decoration: line-through;
  color: var(--done-text);
}
input[type="checkbox"]:checked + label.item .box {
  border-color: var(--accent);
  background: var(--accent-dim);
}
input[type="checkbox"]:checked + label.item .box .checkmark {
  display: block;
}
input[type="checkbox"]:checked + label.item .item-time {
  color: var(--accent);
}

.box {
  width: 15px; height: 15px;
  border: 1px solid var(--muted);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.checkmark {
  display: none;
  width: 7px; height: 7px;
  background: var(--accent);
}

.item-label { flex: 1; font-weight: 500; line-height: 1.4; }

.item-time {
  font-size: 0.6rem;
  color: var(--muted);
  white-space: nowrap;
  text-align: right;
  min-width: 72px;
}

/* edit button */
.edit-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 2px 5px;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  flex-shrink: 0;
  line-height: 1;
}
label.item:hover .edit-btn { opacity: 1; }
.edit-btn:hover { color: var(--accent); }

/* edit input */
.edit-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text);
  font-family: 'Lexend', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  outline: none;
  padding: 1px 2px;
}

/* link item */
.link-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border: 1px solid var(--accent);
  background: var(--accent-dim);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
  transition: background 0.15s;
  user-select: none;
}
.link-item:hover { background: rgba(200,169,110,0.22); }
.link-item .arrow { margin-left: auto; opacity: 0.5; }

/* modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: var(--overlay);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 20px 40px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--modal-bg);
  border: 1px solid var(--border);
  width: 100%; max-width: 580px;
  padding: 24px 22px;
  animation: slideUp 0.18s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
}
.modal-close {
  background: none; border: none;
  color: var(--muted); font-size: 1rem;
  cursor: pointer; padding: 2px 6px;
  transition: color 0.1s;
}
.modal-close:hover { color: var(--text); }
.modal-group-label {
  font-size: 0.57rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 14px 0 6px;
}
.tag-red { color: var(--tag-red); }

footer {
  margin-top: 40px;
  text-align: center;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<script>
const STATE_KEY  = 'todo_state_v2';
const LABELS_KEY = 'todo_labels_v1';
const THEME_KEY  = 'todo_theme';

function getState()  { try { return JSON.parse(localStorage.getItem(STATE_KEY))  || {}; } catch { return {}; } }
function saveState(s){ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }
function getLabels() { try { return JSON.parse(localStorage.getItem(LABELS_KEY)) || {}; } catch { return {}; } }
function saveLabels(l){ localStorage.setItem(LABELS_KEY, JSON.stringify(l)); }

function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + ' ' +
         String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}

function onCheck(id) {
  const chk    = document.getElementById('chk-' + id);
  const timeEl = document.getElementById('time-' + id);
  const state  = getState();
  if (chk.checked) {
    state[id] = Date.now();
    if (timeEl) timeEl.textContent = fmt(state[id]);
  } else {
    delete state[id];
    if (timeEl) timeEl.textContent = '';
  }
  saveState(state);
}

function startEdit(e, id) {
  e.preventDefault();  // prevent label from toggling checkbox
  e.stopPropagation();
  const labelEl = document.getElementById('label-' + id);
  if (!labelEl || labelEl.querySelector('input')) return;

  const original = labelEl.textContent;
  const input = document.createElement('input');
  input.className = 'edit-input';
  input.value = original;
  labelEl.textContent = '';
  labelEl.appendChild(input);
  input.focus();
  input.select();

  const finish = (save) => {
    const val = save && input.value.trim() ? input.value.trim() : original;
    labelEl.textContent = val;
    if (save && val !== original) {
      const labels = getLabels();
      labels[id] = val;
      saveLabels(labels);
    }
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); finish(true); }
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  });
  input.addEventListener('blur', () => finish(true));
}

function clearAll() {
  if (!confirm('Svuotare tutti i check?')) return;
  saveState({});
  document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
  document.querySelectorAll('.item-time').forEach(el => el.textContent = '');
}

function restoreState() {
  const state = getState();
  for (const [id, ts] of Object.entries(state)) {
    const chk    = document.getElementById('chk-' + id);
    const timeEl = document.getElementById('time-' + id);
    if (chk) chk.checked = true;
    if (timeEl) timeEl.textContent = fmt(ts);
  }
}

function restoreLabels() {
  const labels = getLabels();
  for (const [id, text] of Object.entries(labels)) {
    const el = document.getElementById('label-' + id);
    if (el) el.textContent = text;
  }
}

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀ chiaro' : '☾ scuro';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

function openModal(id)  { document.getElementById(id).classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
function overlayClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
restoreLabels();
restoreState();
</script>
</body>
</html>
